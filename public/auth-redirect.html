<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostLog - Sign In</title>
  <style>
    body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .container { text-align: center; padding: 20px; max-width: 320px; width: 100%; }
    .ghost { margin-bottom: 16px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #3b82f6; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 16px; display: none; }
    @keyframes s { to { transform: rotate(360deg); } }
    .status { color: #888; font-size: 14px; margin-bottom: 16px; }
    .error { color: #ff6b6b; font-size: 13px; margin-top: 12px; }
    .return-btn {
      display: none; background: #3b82f6; color: #fff; border: none; padding: 14px 24px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; text-align: center;
      text-decoration: none; -webkit-tap-highlight-color: transparent; margin-top: 12px;
    }
    .return-btn:active { transform: scale(0.98); opacity: 0.9; }
    #g-signin-btn { display: flex; justify-content: center; margin-bottom: 12px; }
    .fallback-link { color: #3b82f6; font-size: 12px; text-decoration: underline; cursor: pointer; margin-top: 16px; display: none; }
    .close-hint { color: #666; font-size: 12px; margin-top: 12px; display: none; line-height: 1.5; }
    .success-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(34,197,94,0.15); display: none; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .success-icon svg { width: 24px; height: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="ghost" id="ghost-logo">
      <svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 8C30 8 18 24 18 42v32c0 4 2 8 6 8s6-4 6-8v-4c0-4 2-8 6-8s6 4 6 8v4c0 4 2 8 6 8s6-4 6-8v-4c0-4 2-8 6-8s6 4 6 8v4c0 4 2 8 6 8s6-4 6-8V42C82 24 70 8 50 8z" fill="white"/>
        <circle cx="38" cy="38" r="5" fill="black"/>
        <circle cx="62" cy="38" r="5" fill="black"/>
        <ellipse cx="50" cy="52" rx="4" ry="3" fill="black"/>
      </svg>
    </div>
    <div class="success-icon" id="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Loading sign-in...</div>
    <div id="g-signin-btn"></div>
    <!-- Use <a> tag for better custom URL scheme handling on iOS -->
    <a class="return-btn" id="return-btn" href="#">Open GhostLog</a>
    <div class="error" id="error"></div>
    <div class="close-hint" id="close-hint">If the button doesn&rsquo;t work, <strong>close this window</strong> to return to GhostLog.</div>
    <div class="fallback-link" id="fallback-link">Having trouble? Tap here to try redirect sign-in</div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <script>
    var CLIENT_ID = '585835627677-loisfssj35vf55r5repl928752rr1ko2.apps.googleusercontent.com';
    var deepLinkUrl = '';

    function $(id) { return document.getElementById(id); }

    function deepLinkBack(url) {
      deepLinkUrl = url;
      $('g-signin-btn').style.display = 'none';
      $('fallback-link').style.display = 'none';
      $('ghost-logo').style.display = 'none';
      $('spinner').style.display = 'block';
      $('status').textContent = 'Success! Returning to GhostLog...';
      $('error').textContent = '';

      // Method 1: Direct location (works on Android, some iOS)
      try { window.location.href = deepLinkUrl; } catch (_) {}

      // Method 2: Hidden iframe (historically works on some iOS versions)
      setTimeout(function() {
        try {
          var iframe = document.createElement('iframe');
          iframe.style.cssText = 'width:0;height:0;border:0;position:absolute;top:-9999px';
          iframe.src = deepLinkUrl;
          document.body.appendChild(iframe);
          setTimeout(function() { try { document.body.removeChild(iframe); } catch(_) {} }, 3000);
        } catch (_) {}
      }, 500);

      // Method 3: Create and click an <a> tag (user-gesture-like)
      setTimeout(function() {
        try {
          var a = document.createElement('a');
          a.href = deepLinkUrl;
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(function() { document.body.removeChild(a); }, 1000);
        } catch (_) {}
      }, 1000);

      // After attempts, show manual return UI
      setTimeout(function() {
        $('spinner').style.display = 'none';
        $('success-icon').style.display = 'flex';
        $('status').textContent = 'Signed in successfully!';
        $('return-btn').href = deepLinkUrl;
        $('return-btn').style.display = 'block';
        $('close-hint').style.display = 'block';
      }, 2000);
    }

    // Pass the Google ID token back to the app via deep link.
    // The app will call signInWithCredential itself — this avoids URL length
    // issues from serializing the full Firebase user JSON (which includes JWTs
    // and can exceed iOS deep link URL limits, causing truncation).
    function firebaseSignInAndReturn(googleIdToken) {
      $('spinner').style.display = 'block';
      $('status').textContent = 'Returning to GhostLog...';
      $('g-signin-btn').style.display = 'none';
      $('fallback-link').style.display = 'none';

      // Send just the Google ID token (~1KB) instead of full Firebase user JSON (~5KB+)
      var encoded = encodeURIComponent(googleIdToken);
      deepLinkBack('com.ghostlog.app://google-auth?idToken=' + encoded);
    }

    // GIS callback — receives Google ID token, signs in via Firebase on this page
    function handleCredentialResponse(response) {
      if (response && response.credential) {
        firebaseSignInAndReturn(response.credential);
      } else {
        $('error').textContent = 'No credential received from Google. Try again.';
      }
    }

    // Make callback global for GIS
    window.handleCredentialResponse = handleCredentialResponse;

    // Redirect fallback — uses implicit OAuth flow
    $('fallback-link').addEventListener('click', function() {
      $('spinner').style.display = 'block';
      $('status').textContent = 'Redirecting to Google...';
      $('g-signin-btn').style.display = 'none';
      $('fallback-link').style.display = 'none';

      var nonce = Math.random().toString(36).substring(2) + Date.now().toString(36);
      var oauthUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
        'client_id=' + encodeURIComponent(CLIENT_ID) +
        '&redirect_uri=' + encodeURIComponent('https://ghost-log.vercel.app/auth-redirect.html') +
        '&response_type=id_token' +
        '&scope=openid%20email%20profile' +
        '&nonce=' + nonce +
        '&prompt=select_account';
      window.location.href = oauthUrl;
    });

    // Check if we're returning from an OAuth redirect (id_token in hash)
    (function checkHashForToken() {
      if (window.location.hash && window.location.hash.indexOf('id_token=') !== -1) {
        var params = new URLSearchParams(window.location.hash.substring(1));
        var idToken = params.get('id_token');
        if (idToken) {
          history.replaceState(null, '', window.location.pathname);
          firebaseSignInAndReturn(idToken);
          return;
        }
      }
    })();

    // Wait for GIS library to load, then initialize
    function initGIS() {
      if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
        setTimeout(initGIS, 100);
        return;
      }

      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false
      });

      google.accounts.id.renderButton(
        $('g-signin-btn'),
        {
          theme: 'filled_black',
          size: 'large',
          shape: 'pill',
          text: 'signin_with',
          width: 300
        }
      );

      $('status').textContent = 'Tap to sign in with Google';
      $('fallback-link').style.display = 'block';
    }

    // Start initialization
    initGIS();
  </script>
</body>
</html>
