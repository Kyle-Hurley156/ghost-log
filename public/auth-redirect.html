<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostLog - Sign In</title>
  <style>
    body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .container { text-align: center; padding: 20px; max-width: 320px; width: 100%; }
    .ghost { margin-bottom: 16px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #3b82f6; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 16px; }
    @keyframes s { to { transform: rotate(360deg); } }
    .status { color: #888; font-size: 14px; margin-bottom: 16px; }
    .error { color: #ff6b6b; font-size: 13px; margin-top: 12px; }
    .google-btn {
      background: #fff; color: #333; border: none; padding: 14px 24px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .google-btn:active { transform: scale(0.98); opacity: 0.9; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="ghost">
      <svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 8C30 8 18 24 18 42v32c0 4 2 8 6 8s6-4 6-8v-4c0-4 2-8 6-8s6 4 6 8v4c0 4 2 8 6 8s6-4 6-8v-4c0-4 2-8 6-8s6 4 6 8v4c0 4 2 8 6 8s6-4 6-8V42C82 24 70 8 50 8z" fill="white"/>
        <circle cx="38" cy="38" r="5" fill="black"/>
        <circle cx="62" cy="38" r="5" fill="black"/>
        <ellipse cx="50" cy="52" rx="4" ry="3" fill="black"/>
      </svg>
    </div>
    <div class="spinner hidden" id="spinner"></div>
    <div class="status" id="status"></div>
    <button class="google-btn" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <div class="error" id="error"></div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    const config = {
      apiKey: "AIzaSyAH3L6UcFaXos3AT3o8W8EHsgWBbL8_ZA4",
      authDomain: "ghost-log.firebaseapp.com",
      projectId: "ghost-log",
      storageBucket: "ghost-log.firebasestorage.app",
      messagingSenderId: "585835627677",
      appId: "1:585835627677:web:9a7a15f79c21a5cb7b0074"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const $ = id => document.getElementById(id);

    function deepLinkBack(googleIdToken) {
      $('google-btn').classList.add('hidden');
      $('spinner').classList.remove('hidden');
      $('status').textContent = 'Success! Returning to GhostLog...';
      window.location.href = 'com.ghostlog.app://google-auth?idToken=' + encodeURIComponent(googleIdToken);
      setTimeout(() => {
        $('status').textContent = 'Signed in! You can close this tab.';
        $('spinner').classList.add('hidden');
      }, 3000);
    }

    function extractGoogleToken(result) {
      // Get the Google OAuth ID token (NOT the Firebase ID token)
      const credential = GoogleAuthProvider.credentialFromResult(result);
      if (credential && credential.idToken) return credential.idToken;
      // Fallback: try the access token
      if (credential && credential.accessToken) return credential.accessToken;
      return null;
    }

    function showError(msg) {
      $('error').textContent = msg;
      $('google-btn').classList.remove('hidden');
      $('spinner').classList.add('hidden');
      $('status').textContent = '';
    }

    // 1. Check if returning from a signInWithRedirect
    try {
      const result = await getRedirectResult(auth);
      if (result && result.user) {
        const token = extractGoogleToken(result);
        if (token) {
          deepLinkBack(token);
        } else {
          showError('Could not get Google credential. Please try again.');
        }
      }
    } catch (e) {
      console.error('Redirect result error:', e);
      // Don't show error - just let user try the button
    }

    // 2. Button click → signInWithPopup (requires user gesture for popup to work)
    $('google-btn').addEventListener('click', async () => {
      $('google-btn').classList.add('hidden');
      $('spinner').classList.remove('hidden');
      $('status').textContent = 'Signing in...';
      $('error').textContent = '';

      const provider = new GoogleAuthProvider();

      try {
        const result = await signInWithPopup(auth, provider);
        const token = extractGoogleToken(result);
        if (token) {
          deepLinkBack(token);
        } else {
          showError('Could not get Google credential. Please try again.');
        }
      } catch (e) {
        console.error('Popup error:', e.code, e.message);

        if (e.code === 'auth/popup-blocked') {
          // Popup blocked — fallback to redirect (page will reload after)
          $('status').textContent = 'Redirecting to Google...';
          try {
            await signInWithRedirect(auth, provider);
          } catch (re) {
            showError('Sign-in failed: ' + (re.message || re));
          }
        } else if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
          // User closed popup — let them try again
          $('google-btn').classList.remove('hidden');
          $('spinner').classList.add('hidden');
          $('status').textContent = '';
        } else {
          showError('Sign-in failed: ' + (e.message || e));
        }
      }
    });
  </script>
</body>
</html>
