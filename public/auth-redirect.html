<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostLog - Sign In</title>
  <style>
    body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .container { text-align: center; padding: 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #3b82f6; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 16px; }
    @keyframes s { to { transform: rotate(360deg); } }
    .status { color: #666; font-size: 14px; }
    .error { color: #ff6b6b; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="status" id="status">Signing in with Google...</div>
    <div class="error" id="error"></div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    const config = {
      apiKey: "AIzaSyAH3L6UcFaXos3AT3o8W8EHsgWBbL8_ZA4",
      authDomain: "ghost-log.firebaseapp.com",
      projectId: "ghost-log",
      storageBucket: "ghost-log.firebasestorage.app",
      messagingSenderId: "585835627677",
      appId: "1:585835627677:web:9a7a15f79c21a5cb7b0074"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);

    try {
      // Check if we're returning from a Google redirect
      const result = await getRedirectResult(auth);

      if (result && result.user) {
        // We have a sign-in result — get the token and deep link back
        const idToken = await result.user.getIdToken();
        document.getElementById('status').textContent = 'Success! Returning to GhostLog...';
        window.location.href = 'com.ghostlog.app://google-auth?idToken=' + encodeURIComponent(idToken);

        // Fallback if deep link doesn't trigger
        setTimeout(() => {
          document.getElementById('status').textContent = 'Signed in! You can close this tab and return to GhostLog.';
        }, 2000);
      } else {
        // First visit — redirect to Google sign-in
        const provider = new GoogleAuthProvider();
        await signInWithRedirect(auth, provider);
      }
    } catch (e) {
      document.getElementById('status').textContent = '';
      if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
        document.getElementById('error').textContent = 'Sign-in cancelled. Close this tab and try again.';
      } else {
        document.getElementById('error').textContent = 'Sign-in failed: ' + (e.message || e);
      }
    }
  </script>
</body>
</html>
