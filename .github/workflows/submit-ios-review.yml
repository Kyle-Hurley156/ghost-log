name: Submit iOS App for Review

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version to submit (e.g. 4.1)'
        required: true
        default: '4.4.1'
      build_first:
        description: 'Trigger a build before submitting?'
        required: false
        type: boolean
        default: false

jobs:
  # Optional: trigger the build workflow first
  build:
    if: ${{ inputs.build_first }}
    uses: ./.github/workflows/build-ios.yml
    secrets: inherit

  submit:
    needs: [build]
    # Run even if build was skipped (build_first=false)
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: pip install PyJWT cryptography requests

      - name: Submit to App Store Review
        env:
          API_KEY_RAW: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_VERSION: ${{ inputs.version }}
        run: |
          python3 << 'PYEOF'
          import jwt
          import time
          import os
          import sys
          import json
          import base64
          import requests

          # --- Config ---
          key_raw = os.environ["API_KEY_RAW"]
          key_id = os.environ["API_KEY_ID"]
          issuer_id = os.environ["API_ISSUER_ID"]
          version = os.environ["APP_VERSION"]
          bundle_id = "com.ghostlog.app"
          base_url = "https://api.appstoreconnect.apple.com/v1"

          # --- Generate JWT ---
          print("Generating JWT...")
          if key_raw.strip().startswith("-----BEGIN"):
              private_key = key_raw
          else:
              decoded = base64.b64decode(key_raw)
              try:
                  private_key = decoded.decode("utf-8")
              except UnicodeDecodeError:
                  from cryptography.hazmat.primitives.serialization import load_der_private_key
                  private_key = load_der_private_key(decoded, password=None)

          now = int(time.time())
          token = jwt.encode(
              {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"},
              private_key,
              algorithm="ES256",
              headers={"alg": "ES256", "kid": key_id, "typ": "JWT"}
          )
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          print("JWT generated successfully")

          def api_get(path, params=None):
              r = requests.get(f"{base_url}{path}", headers=headers, params=params)
              if r.status_code != 200:
                  print(f"::error::GET {path} failed ({r.status_code}): {r.text}")
                  sys.exit(1)
              return r.json()

          def api_post(path, data):
              r = requests.post(f"{base_url}{path}", headers=headers, json=data)
              if r.status_code not in (200, 201):
                  print(f"::error::POST {path} failed ({r.status_code}): {r.text}")
                  return None, r.status_code, r.text
              return r.json(), r.status_code, r.text

          def api_patch(path, data):
              r = requests.patch(f"{base_url}{path}", headers=headers, json=data)
              if r.status_code not in (200, 204):
                  print(f"::error::PATCH {path} failed ({r.status_code}): {r.text}")
                  sys.exit(1)
              return r.status_code

          # --- Step 1: Look up app ---
          print(f"Looking up app with bundle ID: {bundle_id}")
          app_data = api_get("/apps", {"filter[bundleId]": bundle_id, "fields[apps]": "bundleId,name"})
          if not app_data["data"]:
              print(f"::error::No app found with bundle ID {bundle_id}")
              sys.exit(1)
          app_id = app_data["data"][0]["id"]
          app_name = app_data["data"][0]["attributes"].get("name", "Unknown")
          print(f"Found app: {app_name} (ID: {app_id})")

          # --- Step 2: Find latest processed build ---
          print(f"Looking for processed builds of version {version}...")
          build_data = api_get("/builds", {
              "filter[app]": app_id,
              "filter[preReleaseVersion.version]": version,
              "filter[processingState]": "VALID",
              "sort": "-uploadedDate",
              "limit": "1",
              "fields[builds]": "version,uploadedDate,processingState"
          })
          if not build_data["data"]:
              print(f"::error::No processed builds found for version {version}.")
              print("Make sure the build has been uploaded and processed by App Store Connect (takes 5-30 min after upload).")
              sys.exit(1)
          build_id = build_data["data"][0]["id"]
          build_number = build_data["data"][0]["attributes"]["version"]
          print(f"Latest build: #{build_number} (ID: {build_id})")

          # --- Step 3: Find existing version (any editable state) ---
          # Check all versions for this platform — we need to find one we can work with
          print("Checking for existing iOS versions...")
          all_versions = api_get(f"/apps/{app_id}/appStoreVersions", {
              "filter[platform]": "IOS",
              "fields[appStoreVersions]": "versionString,appStoreState",
              "limit": "10"
          })

          version_id = None
          editable_states = ["PREPARE_FOR_SUBMISSION", "DEVELOPER_REJECTED", "REJECTED", "METADATA_REJECTED"]

          # Find all versions and their states
          for v in all_versions["data"]:
              state = v["attributes"]["appStoreState"]
              ver = v["attributes"]["versionString"]
              print(f"  Found version {ver} in state: {state}")

          # Strategy 1: Find an editable version matching our target version
          for v in all_versions["data"]:
              state = v["attributes"]["appStoreState"]
              ver = v["attributes"]["versionString"]
              if state in editable_states and ver == version:
                  version_id = v["id"]
                  print(f"  -> Using matching version {ver} (ID: {version_id})")
                  break

          # Strategy 2: Reuse a PREPARE_FOR_SUBMISSION version with wrong version string
          if not version_id:
              for v in all_versions["data"]:
                  state = v["attributes"]["appStoreState"]
                  ver = v["attributes"]["versionString"]
                  if state == "PREPARE_FOR_SUBMISSION" and ver != version:
                      version_id = v["id"]
                      print(f"  -> Updating version {ver} to {version} (ID: {version_id})")
                      api_patch(f"/appStoreVersions/{version_id}", {
                          "data": {
                              "type": "appStoreVersions",
                              "id": version_id,
                              "attributes": {"versionString": version}
                          }
                      })
                      print(f"  Version string updated to {version}")
                      break

          # Strategy 3: Reuse REJECTED version by updating its version string
          if not version_id:
              for v in all_versions["data"]:
                  state = v["attributes"]["appStoreState"]
                  ver = v["attributes"]["versionString"]
                  if state in ["REJECTED", "DEVELOPER_REJECTED", "METADATA_REJECTED"]:
                      version_id = v["id"]
                      print(f"  -> Reusing {state} version {ver}, updating to {version} (ID: {version_id})")
                      api_patch(f"/appStoreVersions/{version_id}", {
                          "data": {
                              "type": "appStoreVersions",
                              "id": version_id,
                              "attributes": {"versionString": version}
                          }
                      })
                      print(f"  Version string updated to {version}")
                      break

          # Strategy 4: Create fresh if nothing reusable found
          if not version_id:
              print(f"Creating new appStoreVersion {version}...")
              result, status, text = api_post("/appStoreVersions", {
                  "data": {
                      "type": "appStoreVersions",
                      "attributes": {"platform": "IOS", "versionString": version},
                      "relationships": {
                          "app": {"data": {"type": "apps", "id": app_id}},
                          "build": {"data": {"type": "builds", "id": build_id}}
                      }
                  }
              })
              if result is None:
                  print(f"Failed to create version {version}.")
                  print("Check App Store Connect for blocking versions or missing metadata.")
                  sys.exit(1)
              version_id = result["data"]["id"]
              print(f"Created appStoreVersion: {version_id}")

          # Select the build for whichever version we ended up with
          if version_id:
              print(f"Selecting build #{build_number} for version...")
              api_patch(f"/appStoreVersions/{version_id}/relationships/build", {
                  "data": {"type": "builds", "id": build_id}
              })
              print("Build selected successfully")

          # --- Step 4: Handle existing submission (from prior rejection) ---
          # After a rejection, the old appStoreVersionSubmission blocks creating a new one.
          # We must DELETE it first. Also check the version state — if REJECTED, we may need
          # to transition it back to PREPARE_FOR_SUBMISSION.
          print("Checking version state and clearing old submissions...")
          ver_resp = requests.get(f"{base_url}/appStoreVersions/{version_id}", headers=headers,
              params={"fields[appStoreVersions]": "appStoreState,versionString"})
          if ver_resp.status_code == 200:
              ver_state = ver_resp.json()["data"]["attributes"]["appStoreState"]
              print(f"  Version state: {ver_state}")

          # Delete any existing submission (required after rejection)
          sub_resp = requests.get(
              f"{base_url}/appStoreVersions/{version_id}/appStoreVersionSubmission",
              headers=headers
          )
          if sub_resp.status_code == 200:
              sub_data = sub_resp.json()
              if sub_data.get("data"):
                  sub_id = sub_data["data"]["id"]
                  print(f"  Found existing submission {sub_id} — deleting...")
                  del_resp = requests.delete(f"{base_url}/appStoreVersionSubmissions/{sub_id}", headers=headers)
                  print(f"  Delete result: {del_resp.status_code}")
                  if del_resp.status_code in (200, 204):
                      print("  Old submission deleted successfully")
                      time.sleep(2)  # Give ASC a moment to update state
          elif sub_resp.status_code != 404:
              print(f"  Submission check returned {sub_resp.status_code}")

          # Re-check state after deletion
          ver_resp2 = requests.get(f"{base_url}/appStoreVersions/{version_id}", headers=headers,
              params={"fields[appStoreVersions]": "appStoreState"})
          if ver_resp2.status_code == 200:
              new_state = ver_resp2.json()["data"]["attributes"]["appStoreState"]
              print(f"  Version state after cleanup: {new_state}")

          # --- Step 5: Nuke any lingering submission ---
          # After rejection, ASC keeps a phantom submission that blocks CREATE.
          # Try every known method to find and delete it.
          print("Nuking any lingering submissions...")

          # Method 1: relationship endpoint
          sub_rel = requests.get(f"{base_url}/appStoreVersions/{version_id}/appStoreVersionSubmission", headers=headers)
          print(f"  Relationship GET: {sub_rel.status_code}")
          if sub_rel.status_code == 200 and sub_rel.json().get("data"):
              sid = sub_rel.json()["data"]["id"]
              print(f"  Found via relationship: {sid} — deleting...")
              dr = requests.delete(f"{base_url}/appStoreVersionSubmissions/{sid}", headers=headers)
              print(f"  Delete: {dr.status_code}")
              time.sleep(3)

          # Method 2: try version_id as submission ID (some API versions reuse the same ID)
          print(f"  Trying version_id as submission ID...")
          dr2 = requests.delete(f"{base_url}/appStoreVersionSubmissions/{version_id}", headers=headers)
          print(f"  Delete by version_id: {dr2.status_code}")
          if dr2.status_code in (200, 204):
              print("  Phantom submission deleted! Waiting 10s for ASC to propagate...")
              time.sleep(10)

          # Method 3: listing endpoint with filter
          all_subs = requests.get(f"{base_url}/appStoreVersionSubmissions",
              headers=headers, params={"filter[appStoreVersion]": version_id})
          if all_subs.status_code == 200:
              for sub_item in all_subs.json().get("data", []):
                  sid = sub_item["id"]
                  print(f"  Found via listing: {sid} — deleting...")
                  requests.delete(f"{base_url}/appStoreVersionSubmissions/{sid}", headers=headers)
                  time.sleep(5)

          ver_check = requests.get(f"{base_url}/appStoreVersions/{version_id}",
              headers=headers, params={"fields[appStoreVersions]": "appStoreState"})
          if ver_check.status_code == 200:
              state = ver_check.json()["data"]["attributes"]["appStoreState"]
              print(f"  Current state: {state}")

          # --- Step 6: Submit for review (with retry) ---
          submitted = False
          for attempt in range(3):
              print(f"Submitting version {version_id} for App Review (attempt {attempt + 1}/3)...")
              result, status, text = api_post("/appStoreVersionSubmissions", {
                  "data": {
                      "type": "appStoreVersionSubmissions",
                      "relationships": {
                          "appStoreVersion": {
                              "data": {"type": "appStoreVersions", "id": version_id}
                          }
                      }
                  }
              })

              if result is not None:
                  submitted = True
                  break

              # If submission fails with phantom submission error, try deleting version and recreating
              if attempt == 0 and "does not allow 'CREATE'" in str(text):
                  print("")
                  print("  Phantom submission still blocking. Deleting version and recreating...")
                  del_ver = requests.delete(f"{base_url}/appStoreVersions/{version_id}", headers=headers)
                  print(f"  Delete version: {del_ver.status_code}")
                  if del_ver.status_code in (200, 204):
                      print("  Version deleted. Waiting 10s then recreating...")
                      time.sleep(10)
                      create_result, cs, ct = api_post("/appStoreVersions", {
                          "data": {
                              "type": "appStoreVersions",
                              "attributes": {"platform": "IOS", "versionString": version},
                              "relationships": {
                                  "app": {"data": {"type": "apps", "id": app_id}},
                                  "build": {"data": {"type": "builds", "id": build_id}}
                              }
                          }
                      })
                      if create_result:
                          version_id = create_result["data"]["id"]
                          print(f"  New version created: {version_id}")
                      else:
                          print(f"  Failed to recreate version: {ct}")
                  else:
                      print(f"  Could not delete version ({del_ver.status_code}), waiting 15s and retrying...")
                      time.sleep(15)
              elif attempt < 2:
                  wait = 15 * (attempt + 1)
                  print(f"  Waiting {wait}s before retry...")
                  time.sleep(wait)

          if not submitted:
              print("")
              print("Submission failed after 3 attempts. Common reasons:")
              print("  - Missing screenshots or app description")
              print("  - Missing privacy policy URL")
              print("  - Missing content rating / age rating")
              print("  - Export compliance not answered")
              print("  - Phantom submission from prior rejection still blocking")
              print("")
              print("Check App Store Connect for specific issues.")
              try:
                  detail = json.loads(text)
                  for err in detail.get("errors", []):
                      print(f"  Error: {err.get('detail', err.get('title', 'Unknown'))}")
              except:
                  pass
              sys.exit(1)

          print("")
          print("=========================================")
          print("  App submitted for App Store Review!")
          print(f"  Version: {version}")
          print(f"  Build: #{build_number}")
          print("=========================================")
          print("")
          print("Monitor review status at: https://appstoreconnect.apple.com")
          PYEOF
