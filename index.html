<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Branding -->
    <title>GhostLog</title>
    <meta name="description" content="AI-powered fitness & nutrition tracker. Train smarter. Eat better.">
    <meta name="theme-color" content="#000000">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GhostLog">

    <!-- Styles are compiled from index.css via PostCSS/Tailwind at build time -->
  </head>
  <body>
    <div id="root"></div>
    <div id="startup-error"></div>
    <script>
      window.onerror = function(msg, url, line) {
        var el = document.getElementById('startup-error');
        if (el) { el.style.display = 'block'; el.textContent = msg + ' (' + url + ':' + line + ')'; }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('startup-error');
        if (el) { el.style.display = 'block'; el.textContent = 'Unhandled: ' + (e.reason && e.reason.message || e.reason); }
      });
    </script>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
